<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark brown rounded border/background -->
  <rect width="32" height="32" rx="4" fill="#1a0c05"/>

  <!-- Teal sky -->
  <rect x="2" y="2" width="28" height="19" fill="#2a9d8f"/>

  <!-- Lighter teal arc bands (sky curves) -->
  <path d="M7,5 Q16,3 25,5" stroke="#52c8be" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M8,8 Q16,6.5 24,8" stroke="#6dd4ca" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M9,11 Q16,9.5 23,11" stroke="#88ddd5" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Sun (golden yellow) -->
  <circle cx="16" cy="17.5" r="3.5" fill="#f2c030"/>

  <!-- Earth layer 1 — dark base -->
  <rect x="2" y="25" width="28" height="5" fill="#8b4018"/>
  <!-- Earth layer 2 — orange-brown mid -->
  <path d="M2,21 Q16,19.5 30,21 L30,25 L2,25Z" fill="#c87828"/>
  <!-- Earth layer 3 — sandy highlight band -->
  <path d="M2,21 Q16,19.5 30,21 L30,22.5 Q16,21 2,22.5Z" fill="#e8b040"/>

  <!-- Canyon wall LEFT — lighter face -->
  <path d="M2,2 L11,2 L13,21 L2,21Z" fill="#7a3818"/>
  <!-- Canyon wall LEFT — darker inner shadow -->
  <path d="M2,2 L6,2 L7.5,21 L2,21Z" fill="#3d1808"/>

  <!-- Canyon wall RIGHT — lighter face -->
  <path d="M30,2 L21,2 L19,21 L30,21Z" fill="#7a3818"/>
  <!-- Canyon wall RIGHT — darker inner shadow -->
  <path d="M30,2 L26,2 L24.5,21 L30,21Z" fill="#3d1808"/>
</svg>
