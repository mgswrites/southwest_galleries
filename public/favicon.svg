<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark brown border/background -->
  <rect width="32" height="32" rx="3" fill="#1a0e06"/>

  <!-- Teal sky -->
  <rect x="2" y="2" width="28" height="20" fill="#2a9d8f"/>

  <!-- Lighter teal arc bands (sky curves) -->
  <path d="M7,6 Q16,3 25,6" stroke="#56c9bf" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M8,9 Q16,6.5 24,9" stroke="#7dd9d0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M9,12 Q16,10 23,12" stroke="#9ae4dc" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Sun (golden yellow) -->
  <circle cx="16" cy="17.5" r="3.8" fill="#f4c430"/>

  <!-- Desert earth layers -->
  <rect x="2" y="22" width="28" height="8" fill="#b85c28"/>
  <path d="M2,22 Q16,20.5 30,22 L30,24.5 Q16,23 2,24.5Z" fill="#e89030"/>

  <!-- Canyon wall LEFT — lighter face -->
  <path d="M2,2 L10,2 L12,22 L2,22Z" fill="#7a3818"/>
  <!-- Canyon wall LEFT — darker inner shadow -->
  <path d="M2,2 L6,2 L8.5,22 L2,22Z" fill="#3d1808"/>

  <!-- Canyon wall RIGHT — lighter face -->
  <path d="M30,2 L22,2 L20,22 L30,22Z" fill="#7a3818"/>
  <!-- Canyon wall RIGHT — darker inner shadow -->
  <path d="M30,2 L26,2 L23.5,22 L30,22Z" fill="#3d1808"/>
</svg>
